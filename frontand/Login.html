<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Login - Painel Admin</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0f172a;
    }

    .container {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      padding: 40px;
      border-radius: 16px;
      width: 320px;
      box-shadow: 0 0 20px rgba(0,0,0,0.4);
    }

    h2 {
      color: white;
      text-align: center;
      margin-bottom: 25px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: none;
      border-radius: 8px;
      outline: none;
      background: #1e293b;
      color: white;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      border: none;
      border-radius: 8px;
      background: #3b82f6;
      color: white;
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s;
    }

    button:hover {
      background: #2563eb;
    }

    .msg {
      text-align: center;
      margin-top: 10px;
      color: #f87171;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <div class="container">
    <h2>Login Admin</h2>

    <input type="text" id="email" placeholder="Usuário">
    <input type="password" id="senha" placeholder="Senha">

    <button onclick="login()">Entrar</button>

    <div class="msg" id="msg"></div>
  </div>

  <script>
    async function login() {
      const email = document.getElementById("email").value;
      const senha = document.getElementById("senha").value;

      try {
        const res = await fetch("http://localhost:3000/auth/login", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            email: email,
            password: senha
          })
        });

        const data = await res.json();

        if (res.ok) {
          localStorage.setItem("token", data.token);
          window.location.href = "dashboard.html";
        } else {
          document.getElementById("msg").innerText = "Login inválido";
        }

      } catch (err) {
        document.getElementById("msg").innerText = "Erro no servidor";
      }
    }
  </script>

</body>
</html>
